<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨語拾光 數位產品</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-background"></div>

<header>
    <h1>墨語拾光 數位產品</h1>
    <nav>
        <button class="nav-btn active" onclick="showPage('shop')">精選商品</button>
        <button class="nav-btn" onclick="showPage('notice')">購買須知</button>
    </nav>
</header>

<div class="container">
    <section id="page-shop" class="page active">
        <div id="product-list" class="product-grid">
            <p class="status">正在開啟檔案...</p>
        </div>
    </section>

    <section id="page-notice" class="page">
        <div class="notice-container" id="notice-content">
            <p class="status">載入公告中...</p>
        </div>
    </section>
</div>

<div id="cart-bar" class="cart-bar" onclick="openCartModal()">
    <div class="cart-info">
        <span class="cart-icon">🛒</span>
        <span id="cart-count">0</span> 件商品
    </div>
    <button class="checkout-btn">前往結帳</button>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeCartModal()">&times;</span>
        <h2>YOUR CART / 購物車</h2>
        
        <div id="cart-items" class="cart-items-list">
            </div>

        <div class="cart-summary">
            <span>總計</span>
            <span id="cart-total-price">NT$ 0</span>
        </div>

        <hr class="divider">

        <h3>CHECKOUT / 結帳資料</h3>
        <div class="bank-box">
            <p><strong>匯款資訊</strong></p>
            <p>銀行代碼：822 (中國信託)</p>
            <p>帳號：123-45678-901</p>
        </div>

        <form id="order-form">
            <input type="hidden" id="form-product-names">
            <input type="text" id="name" placeholder="NAME / 姓名" required>
            <input type="text" id="ig" placeholder="INSTAGRAM / IG 帳號" required>
            <input type="email" id="email" placeholder="GMAIL / 電子信箱" required>
            <input type="text" id="bank" placeholder="BANK / 匯款末五碼" required>
            <button type="submit" id="submit-btn" class="submit-btn">SEND ORDER</button>
        </form>
    </div>
</div>

<script>
    // 🚨 重要：請在此處替換成你的 Google Apps Script 網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJG4HBFGpz8qy0DSPfTr8OkDwFa3Fo8M902iBYfuoG-KPG32uhER33msrihDcJ_TiYMQ/exec';
    
    // 購物車資料結構
    let cart = [];

    async function fetchData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            
            // 渲染商品 (改為雙列排版)
            const productGrid = document.getElementById('product-list');
            productGrid.innerHTML = data.products.map(item => `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${item.商品圖片}" alt="${item.商品名稱}">
                    </div>
                    <div class="info">
                        <span class="category">${item.標籤}</span>
                        <h3>${item.商品名稱}</h3>
                        <p class="price">NT$ ${item.價格}</p>
                        <button class="add-to-cart-btn" onclick="addToCart('${item.商品名稱}', ${item.價格})">ADD TO CART</button>
                    </div>
                </div>
            `).join('');

            // 渲染公告
            const noticeBox = document.getElementById('notice-content');
            noticeBox.innerHTML = data.notices.map(n => `<p>・ ${n}</p>`).join('');

        } catch (e) {
            console.error(e);
        }
    }

    // --- 購物車邏輯 ---

    function addToCart(name, price) {
        // 檢查是否已在購物車中
        const exists = cart.some(item => item.name === name);
        if (exists) {
            alert('此商品已在購物車中囉！');
            return;
        }

        cart.push({ name, price });
        updateCartBar();
        
        // 簡單的動態回饋
        event.target.innerText = 'ADDED ✓';
        event.target.style.background = '#27ae60';
        setTimeout(() => {
            event.target.innerText = 'ADD TO CART';
            event.target.style.background = '#1a1a1a';
        }, 1000);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartBar();
        renderCartItems(); // 重新渲染列表
    }

    function updateCartBar() {
        const cartBar = document.getElementById('cart-bar');
        const cartCount = document.getElementById('cart-count');
        
        cartCount.innerText = cart.length;
        
        if (cart.length > 0) {
            cartBar.classList.add('active');
        } else {
            cartBar.classList.remove('active');
        }
    }

    function renderCartItems() {
        const cartItemsList = document.getElementById('cart-items');
        const cartTotalPrice = document.getElementById('cart-total-price');
        
        if (cart.length === 0) {
            cartItemsList.innerHTML = '<p class="empty-cart">購物車是空的</p>';
            cartTotalPrice.innerText = 'NT$ 0';
            return;
        }

        let total = 0;
        cartItemsList.innerHTML = cart.map((item, index) => {
            total += item.price;
            return `
                <div class="cart-item">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">NT$ ${item.price}</span>
                    <span class="remove-item" onclick="removeFromCart(${index})">&times;</span>
                </div>
            `;
        }).join('');
        
        cartTotalPrice.innerText = 'NT$ ' + total;
    }

    // --- 彈窗與分頁邏輯 ---

    function openCartModal() {
        renderCartItems();
        document.getElementById('cart-modal').style.display = 'block';
    }

    function closeCartModal() {
        document.getElementById('cart-modal').style.display = 'none';
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- 送出訂單 ---
    const orderForm = document.getElementById('order-form');
    orderForm.onsubmit = async (e) => {
        e.preventDefault();
        
        if (cart.length === 0) {
            alert('購物車沒有商品喔！');
            return;
        }

        const submitBtn = document.getElementById('submit-btn');
        
        // 將購物車商品名稱合併成一個字串 (例如："筆刷A, 模板B")
        const productNamesString = cart.map(item => item.name).join(', ');

        const formData = {
            name: document.getElementById('name').value,
            ig: document.getElementById('ig').value,
            email: document.getElementById('email').value,
            bankInfo: document.getElementById('bank').value,
            productName: productNamesString // 傳送合併後的名稱
        };

        submitBtn.innerText = 'PROCESSING...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert('訂單已送出！請等待確認，權限開通後會收到 Email 通知。');
                cart = []; // 清空購物車
                updateCartBar();
                orderForm.reset();
                closeCartModal();
            }
        } catch (error) {
            alert('送出失敗，請聯繫店主。');
        } finally {
            submitBtn.innerText = 'SEND ORDER';
            submitBtn.disabled = false;
        }
    };

    fetchData();
</script>
</body>
</html>
